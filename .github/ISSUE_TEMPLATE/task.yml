name: Task
description: Define a scoped project task.
title: ""
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What motivates this task?
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this is done?
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: Possible direction
      description: Notes, constraints, or relevant code paths.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals

  - type: textarea
    id: validation
    attributes:
      label: Validation notes

  - type: textarea
    id: labels
    attributes:
      label: Labels to consider
      description: Prefer existing labels. Add a new label only when it is likely to be reused and improves triage or review.
